<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Yummy Dummy</title>
    <link rel="Stylesheet" href="style.css">
  </head>
  <body>
    <p class="title-section">Yummy Dummy</p>
    <div class="main-section">
      <div class="pantry-section">
          <p class="main-headings">YOUR PANTRY</p>
          <div class="ingredient-section">
            <div class="ingredient-input">
              <label for="ingredient-label">Add Ingredients...</label>
              <br>
              <input type="text" id="ingredient-label" placeholder="Type here:" />          
            </div>
            <div class="ingredient-tags-container">
                <p>Ingredient tag system:</p>
                <br>
            </div>
          </div>
          <div class="submit-button-container">
          <button id="submit-ingredients-button">
            <span>FIND RECIPES</span>
          </button>
          </div>
          <div class="cooking-icon-container">
            <img src="./hot-pot.png" id="cooking-png" alt="Cooking..." >
          </div>
      </div>
      <div class="chef-slate">
        <p class="main-headings">THE CHEF'S SLATE</p>
        <div class="dish-image-container"></div>
        <p class="main-headings dish-name">Sample names</p> 
      </div>
    </div>
  </body>
</html>
